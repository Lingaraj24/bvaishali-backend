# ─────────────────────────────────────────────────────────
# LOCAL dev: starts Postgres + Redis only.
# Run the API itself with: npm run start:dev
#
# Usage:
#   docker compose up -d        # start DB + Redis
#   docker compose down -v      # full reset (deletes DB data)
# ─────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: bvaishali_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bvaishali
      POSTGRES_PASSWORD: bvaishali_dev
      POSTGRES_DB: bvaishali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bvaishali"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bvaishali_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
